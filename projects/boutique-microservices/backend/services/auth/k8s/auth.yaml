kind: Deployment
apiVersion: apps/v1

metadata:
  name: boutique-auth-deployment
  namespace: boutique
  labels:
    app: auth

spec:
  replicas: 2 
  selector:
    matchLabels:
        app: auth

  template:
    metadata:
      labels:
        app: auth

    spec:
      containers:
        - name: boutique-auth
          image: mishranishant/boutique-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002 
          env:
            - name: NODE_ENV
              value: "development"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dbcred
                  key: DBurl


---

kind: Service
apiVersion: v1

metadata:
  name: boutique-auth-service 
  namespace: boutique

spec:
  type: NodePort

  ports:
    - port: 3002
      targetPort: 3002
      nodePort: 32003
      protocol: TCP
      name: http

  selector:
    app: auth
