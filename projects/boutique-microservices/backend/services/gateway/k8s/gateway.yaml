kind: Deployment
apiVersion: apps/v1

metadata:
  name: boutique-gateway-deployment
  namespace: boutique
  labels:
    app: gateway


spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway

  template:
    metadata:
      labels:
        app: gateway

    spec:
      containers:
        - name: boutique-gateway
          image: mishranishant/boutique-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "development"
            - name: AUTH_SERVICE_URL
              value: "http://boutique-auth-service:3002"
            - name: PRODUCTS_SERVICE_URL
              value: "http://boutique-products-service:3003"
            - name: ORDER_SERVICE_URL
              value: "http://boutique-order-srv-service:3004"
            - name: ORDERS_SERVICE_URL
              value: "http://boutique-orders-service:3005"
            - name: USER_SERVICE_URL
              value: "http://boutique-user-service:3006"

---

kind: Service
apiVersion: v1

metadata:
  name: boutique-gateway-service
  namespace: boutique

spec:
  type: NodePort
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 32002
      protocol: TCP
      name: http

  selector:
    app: gateway
