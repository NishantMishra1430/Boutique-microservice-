kind: Deployment
apiVersion: apps/v1
metadata: 
  name: boutique-frontend-deployment
  namespace: boutique
  labels:
    app: frontend


spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend


  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: boutique-frontend
          image: mishranishant/boutique-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env: 
            - name: REACT_APP_API_URL 
              value: "http://157.173.121.36:32002"



---

kind: Service
apiVersion: v1
metadata: 
  name: boutique-frontend-service
  namespace: boutique

spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      nodePort: 32001
      name: http

  selector:
    app: frontend

