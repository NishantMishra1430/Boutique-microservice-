name: Boutique CI

on:
  push:
    branches:
      - local-test


jobs:
  Deploy:
    runs-on: ubuntu:latest

    steps:
      
      - name: Docker Login # Step - 1 
        uses: docker/login-action@v3
        with:
          username: ${{vars.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Docker Setup # Step - 2
        uses: docker/setup-buildx-action@v3

  # Verifying Code Changes
      - name: Code Checkout # Step - 1
        uses: actions/checkout@v4

  # Building Images

      - name: B&P Boutique Frontend # Step - 2
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/frontend/ 
          push: true
          load: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-frontend:latest


      - name: B&P Boutique Backend Gateway # Step - 3
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/gateway
          load: true
          push: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-gateway:latest


      - name: B&P Boutique Backend Auth # Step - 4
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/auth
          load: true
          push: true
          tags:${{vars.DOCKER_USERNAME}}/boutique-auth:latest


      - name: B&P Boutique Backend Order Service # Step - 5
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/order-service
          load: true
          push: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-order-service:latest


      - name: B&P Boutique Backend orders # Step - 6
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/orders
          load: true
          push: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-orders:latest


      - name: B&P Boutique Backend Product-Service # Step - 7
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/product-service
          load: true
          push: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-product-service:latest


      - name: B&P Boutique Backend User-Service # Step - 8
        uses: docker/build-push-action@v5
        with:
          context: ../../projects/boutique-microservices/backend/services/user-service
          load: true
          push: true
          tags: ${{vars.DOCKER_USERNAME}}/boutique-user-service:latest
    
  # Scanning Vulnerabilities

      - name: Scanning Frontend # Step - 1
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{vars.DOCKER_USERNAME}}/boutique-frontend:latest
          ignore-unchanged: true
          only-serverities: critical
          exit-code: true


